<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        #status { padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 0.9em; }
        .connected { background: #e8f5e9; color: #2e7d32; }
        .disconnected { background: #ffebee; color: #c62828; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .box { padding: 20px; border-radius: 15px; border: 1px solid #edf2f7; background: #fff; transition: all 0.3s ease; }
        .label { font-size: 0.8rem; color: #718096; margin-bottom: 5px; }
        .value { font-size: 1.2rem; font-weight: bold; color: #2d3748; }

        /* Trạng thái mưa */
        .rain-dry { border: 2px solid #f6e05e; background-color: #fffff0; }
        .rain-active { border: 2px solid #4299e1; background-color: #ebf8ff; color: #2b6cb0; animation: pulse 2s infinite; }

        /* --- STYLE MỚI CHO GIÀN PHƠI --- */
        .rack-outside { border: 2px solid #48bb78; background-color: #f0fff4; color: #2f855a; } /* Màu xanh lá */
        .rack-inside { border: 2px solid #a0aec0; background-color: #edf2f7; color: #4a5568; }  /* Màu xám */

        /* KHU VỰC NÚT NHẤN */
        .controls { display: flex; gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s ease; }
        .btn-on { background-color: #48bb78; box-shadow: 0 4px 14px 0 rgba(72, 187, 120, 0.39); }
        .btn-on:hover { background-color: #38a169; transform: translateY(-2px); }
        .btn-off { background-color: #f56565; box-shadow: 0 4px 14px 0 rgba(245, 101, 101, 0.39); }
        .btn-off:hover { background-color: #e53e3e; transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">Giám sát ESP32</h2>
    <div id="status" class="disconnected">Đang kết nối...</div>

    <div class="grid">
        <div class="box">
            <div class="label">Ánh sáng</div>
            <div id="light-val" class="value" style="color: #ed8936;">0 Lux</div>
        </div>
        <div id="rain-box" class="box rain-dry">
            <div class="label">Cảm biến mưa</div>
            <div id="rain-status" class="value">Khô ráo</div>
        </div>
        <div id="rack-box" class="box rack-inside" style="grid-column: span 2;">
            <div class="label">Vị trí giàn phơi</div>
            <div id="rack-status" class="value">Đang ở trong</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="sendControl('ON')" class="btn btn-on">BẬT (ON)</button>
        <button onclick="sendControl('OFF')" class="btn btn-off">TẮT (OFF)</button>
    </div>

    <p style="font-size: 0.7rem; color: #a0aec0; margin-top: 20px;">MQTT Topic: control/test1</p>
</div>

<script src="main.js"></script>
</body>
</html>
