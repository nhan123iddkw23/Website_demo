<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giám sát Giàn Phơi ESP32</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        #status { padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 0.9em; }
        .connected { background: #e8f5e9; color: #2e7d32; }
        .disconnected { background: #ffebee; color: #c62828; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .box { padding: 20px; border-radius: 15px; border: 1px solid #edf2f7; background: #fff; transition: all 0.3s ease; }
        .label { font-size: 0.8rem; color: #718096; margin-bottom: 5px; }
        .value { font-size: 1.1rem; font-weight: bold; color: #2d3748; }

        /* Trạng thái mưa */
        .rain-dry { border: 2px solid #f6e05e; background-color: #fffff0; }
        .rain-active { border: 2px solid #4299e1; background-color: #ebf8ff; color: #2b6cb0; animation: pulse 2s infinite; }

        /* Vị trí giàn phơi */
        .rack-outside { border: 2px solid #48bb78; background-color: #f0fff4; color: #2f855a; }
        .rack-inside { border: 2px solid #a0aec0; background-color: #edf2f7; color: #4a5568; }

        /* KHU VỰC NÚT NHẤN ĐIỀU KHIỂN */
        .controls { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 25px; }
        .btn { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 0.85rem; cursor: pointer; transition: all 0.2s ease; }
        
        .btn-on { background-color: #48bb78; box-shadow: 0 4px 10px rgba(72, 187, 120, 0.3); } /* Xanh lá */
        .btn-stop { background-color: #ed8936; box-shadow: 0 4px 10px rgba(237, 137, 54, 0.3); } /* Cam */
        .btn-off { background-color: #f56565; box-shadow: 0 4px 10px rgba(245, 101, 101, 0.3); } /* Đỏ */
        
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); }

        .btn-mode-active { background-color: #4a5568; color: white; border: 2px solid #2d3748; }
        .btn-mode-inactive { background-color: #e2e8f0; color: #4a5568; border: 2px solid #cbd5e0; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">Giám sát ESP32</h2>
    <div id="status" class="disconnected">Đang kết nối...</div>

    <div class="grid">
        <div class="box">
            <div class="label">Ánh sáng</div>
            <div id="light-val" class="value" style="color: #ed8936;">---</div>
        </div>
        <div id="rain-box" class="box rain-dry">
            <div class="label">Cảm biến mưa</div>
            <div id="rain-status" class="value">---</div>
        </div>
        <div id="rack-box" class="box rack-inside" style="grid-column: span 2;">
            <div class="label">Vị trí giàn phơi</div>
            <div id="rack-status" class="value">Đang kiểm tra...</div>
        </div>
    </div>
    <div style="margin-bottom: 20px; text-align: center;">
        <label style="font-weight: bold; display: block; margin-bottom: 8px;">Chế độ hoạt động:</label>
        <div style="display: flex; gap: 10px;">
            <button id="btn-manual" onclick="setMode('MANUAL')" class="btn btn-mode-active">THỦ CÔNG</button>
            <button id="btn-auto" onclick="setMode('AUTO')" class="btn btn-mode-inactive">TỰ ĐỘNG</button>
        </div>
    </div>
    <div class="controls">
        <button onclick="sendControl('ON')" class="btn btn-on">ĐẨY RA</button>
        <button onclick="sendControl('STOP')" class="btn btn-stop">DỪNG</button>
        <button onclick="sendControl('OFF')" class="btn btn-off">THU VÀO</button>
    </div>

    <p style="font-size: 0.7rem; color: #a0aec0; margin-top: 20px;">Topic: control/test1 | Lệnh: control/device</p>
</div>

<script src="index.js"></script>
</body>
</html>
